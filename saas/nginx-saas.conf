# Nginx config for the MakOne SaaS control plane
# Serves the root domain (makone-bi.com) and proxies to the Flask app
# Place at: /etc/nginx/sites-enabled/makone-saas.conf
# Certbot will add SSL blocks automatically

server {
    listen 80;
    server_name makone-bi.com www.makone-bi.com;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name makone-bi.com www.makone-bi.com;

    # SSL — Certbot fills these in
    ssl_certificate     /etc/letsencrypt/live/makone-bi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/makone-bi.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    # Stripe webhook — direct to Flask
    location /stripe/webhook {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Everything else → Flask SaaS app
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
